server:
  port: ${PORT:8789}
  address: ${HOST:0.0.0.0}

spring:
  application:
    name: reestr-mkd-backend-java-jpa
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/reestr_mkd}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

app:
  auth-mode: ${AUTH_MODE:dev}
  jwt-secret: ${JWT_SECRET:}
  runtime-env: ${RUNTIME_ENV:${APP_ENV:${NODE_ENV:dev}}}
