server:
  port: ${PORT:8788}
  address: ${HOST:0.0.0.0}

spring:
  application:
    name: reestr-mkd-backend-java
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/reestr_mkd}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

app:
  auth-mode: ${AUTH_MODE:dev}
  jwt-secret: ${JWT_SECRET:}
  runtime-env: ${RUNTIME_ENV:${APP_ENV:${NODE_ENV:dev}}}
  cors-origin: ${CORS_ORIGIN:}
  idempotency:
    ttl-ms: ${IDEMPOTENCY_TTL_MS:300000}
    max-entries: ${IDEMPOTENCY_MAX_ENTRIES:2000}

logging:
  level:
    root: INFO
    uz.reestrmkd.backend: INFO
