spring:
  application:
    name: spring-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: ReestrMkdHikariPool
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
      maximum-pool-size: ${DB_POOL_MAX_SIZE:20}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:300000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1800000}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT_MS:30000}
      validation-timeout: ${DB_POOL_VALIDATION_TIMEOUT_MS:5000}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          time_zone: UTC

app:
  runtime-env: ${RUNTIME_ENV:${APP_ENV:${NODE_ENV:dev}}}
  auth-mode: ${AUTH_MODE:dev}
  jwt-secret: ${JWT_SECRET:}
  cors:
    origin: ${CORS_ORIGIN:${FRONTEND_URL:}}
  idempotency:
    ttl-ms: ${IDEMPOTENCY_TTL_MS:300000}
    max-entries: ${IDEMPOTENCY_MAX_ENTRIES:2000}

server:
  address: ${HOST:0.0.0.0}
  port: ${PORT:8787}
